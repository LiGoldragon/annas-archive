[package]
name = "annas-archive"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Rust client library for Anna's Archive"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "cookies", "rustls-tls"] }
scraper = "0.22"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
urlencoding = "2.1"
