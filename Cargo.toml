[package]
name = "annas-archive"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Rust client library and MCP server for Anna's Archive"

[lib]
name = "annas_archive"
path = "src/lib.rs"

[[bin]]
name = "annas-archive"
path = "src/main.rs"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "cookies", "rustls-tls"] }
rmcp = { version = "0.16", features = ["server", "transport-io", "macros"] }
scraper = "0.22"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
urlencoding = "2.1"
